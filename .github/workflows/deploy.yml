name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # main is the production build, served at the site root. dev is a
      # preview build, served at /dev/. Both are checked out and built
      # every run (regardless of which branch triggered it) and combined
      # into one artifact, so neither deploy ever clobbers the other.
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            main/package-lock.json
            dev/package-lock.json

      - name: Build main (production, served at /)
        working-directory: main
        run: |
          npm ci
          npm run build

      - name: Build dev (preview, served at /dev/)
        working-directory: dev
        env:
          NEXT_PUBLIC_BASE_PATH: /onesherpa-lander/dev
        run: |
          npm ci
          npm run build

      - name: Assemble combined site
        run: |
          mkdir -p site
          cp -r main/out/. site/
          mkdir -p site/dev
          cp -r dev/out/. site/dev/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
